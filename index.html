<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Generator - Professional</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://t3.ftcdn.net/jpg/02/79/11/39/360_F_279113941_V74yv2LAV842Y0Q9Q3XbshnEonmO7v26.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 900px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 20px;
        }

        .left-panel { flex: 1; }
        .right-panel { 
            flex: 1; 
            background: rgba(0,0,0,0.4); 
            border-radius: 15px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 2px dashed #444;
        }

        h2 { color: #00d2ff; margin-top: 0; }

        textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-gen { background: linear-gradient(45deg, #00c6ff, #0072ff); color: white; }
        .btn-down { background: #28a745; color: white; display: none; text-align: center; text-decoration: none; }

        video { width: 100%; border-radius: 10px; display: none; }

        /* Loader Animation */
        .loader {
            display: none;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #00d2ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <h2>AI Video Generator</h2>
        <label>Enter Prompt:</label>
        <textarea id="prompt" rows="4" placeholder="Describe your video scene..."></textarea>
        
        <label>Aspect Ratio:</label>
        <select id="ratio">
            <option>16:9 (Horizontal)</option>
            <option>9:16 (Vertical)</option>
        </select>

        <button class="btn btn-gen" onclick="startGeneration()">Generate AI Video</button>
        <a id="downloadBtn" class="btn btn-down" download="AI_Generated_Video.mp4">Download Video</a>
    </div>

    <div class="right-panel" id="previewBox">
        <div class="loader" id="loader"></div>
        <p id="statusText">Video Preview will appear here</p>
        <video id="videoPlayer" controls></video>
    </div>
</div>

<script>
    async function startGeneration() {
        const promptText = document.getElementById('prompt').value;
        const videoPlayer = document.getElementById('videoPlayer');
        const loader = document.getElementById('loader');
        const statusText = document.getElementById('statusText');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!promptText) {
            alert("Please enter a prompt first!");
            return;
        }

        // Reset UI
        statusText.innerText = "AI is thinking...";
        loader.style.display = "block";
        videoPlayer.style.display = "none";
        downloadBtn.style.display = "none";

        // Step 1: Simulate Generation Delay (3 seconds)
        setTimeout(async () => {
            // Hum ek sample video URL use kar rahe hain simulation ke liye
            const videoUrl = "https://www.w3schools.com/html/mov_bbb.mp4";
            
            // Step 2: Auto Voice-Over (Speech)
            const speech = new SpeechSynthesisUtterance(promptText);
            window.speechSynthesis.speak(speech);

            // Step 3: Video Load
            videoPlayer.src = videoUrl;
            videoPlayer.style.display = "block";
            loader.style.display = "none";
            statusText.style.display = "none";

            // Step 4: Enable Download
            // Hum video file ko fetch karke blob banayenge taake asli download ho sake
            const response = await fetch(videoUrl);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            
            downloadBtn.href = blobUrl;
            downloadBtn.style.display = "block";
            
            alert("Video Generated Successfully!");
        }, 3000);
    }
</script>

</body>
</html>
