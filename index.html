<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Caption Generator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a00ff, #0077ff);
}

/* Glass Container */
.container {
    width: 90%;
    max-width: 500px;
    padding: 30px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
    text-align: center;
    animation: fadeIn 1s ease;
}

/* Title */
h1 {
    font-size: 28px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #ff4dff, #00ffff);
    -webkit-background-clip: text;
    color: transparent;
}

/* Input */
input {
    width: 100%;
    padding: 15px;
    border-radius: 25px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 15px;
    transition: 0.3s;
}

input::placeholder {
    color: #ddd;
}

input:focus {
    box-shadow: 0 0 10px #00ffff;
}

/* Button */
button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(45deg, #ff4d4d, #ff9900);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff6600;
}

/* Output */
.output {
    margin-top: 20px;
}

/* Caption Cards */
.card {
    padding: 12px;
    margin-top: 10px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    animation: slideUp 0.5s ease;
}

/* Warning */
.warning {
    color: #ff4d4d;
    margin-top: 10px;
}

/* Loader */
.loader {
    margin-top: 15px;
    color: white;
    font-size: 14px;
}

/* Animations */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

@keyframes slideUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* Responsive */
@media(max-width:500px){
    h1 {font-size:22px;}
}

</style>
</head>

<body>

<div class="container">
    <h1>AI Caption Generator</h1>

    <input type="text" id="inputText" placeholder="Enter your text...">

    <button onclick="generateCaption()">Generate Caption</button>

    <div id="warning" class="warning"></div>
    <div id="loader" class="loader"></div>

    <div id="output" class="output"></div>
</div>

<script>

const templates = [
    "🔥 {text} vibes only 😎✨",
    "✨ Living for this: {text} 💖",
    "😎 Too cool for rules – {text} 🔥",
    "🌟 {text} energy hits different 💯",
    "💖 Just me and {text} moments ✨",
    "🔥 {text} but make it iconic 😎",
    "✨ Feeling unstoppable with {text} 💥",
    "😎 {text} mood all day 🔥",
    "💖 Keep shining with {text} ✨",
    "🌟 {text} = pure magic 💫"
];

function generateCaption() {
    const input = document.getElementById("inputText").value.trim();
    const output = document.getElementById("output");
    const warning = document.getElementById("warning");
    const loader = document.getElementById("loader");

    output.innerHTML = "";
    warning.innerText = "";
    loader.innerText = "";

    if(input === "") {
        warning.innerText = "⚠️ Please enter some text!";
        return;
    }

    loader.innerText = "Generating captions... ⏳";

    setTimeout(() => {
        loader.innerText = "";

        let used = [];
        let count = Math.floor(Math.random() * 3) + 3; // 10-15 captions

        for(let i=0; i<count; i++) {
            let template;

            do {
                template = templates[Math.floor(Math.random() * templates.length)];
            } while(used.includes(template));

            used.push(template);

             let caption = template.replace("{text}", input);

            let div = document.createElement("div");
            div.className = "card";
            div.innerText = caption;

            output.appendChild(div);
        }

    }, 1000);
}

</script>

</body>
</html>
