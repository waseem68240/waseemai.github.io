<!DOCTYPE html>
<html>
<head>
<title>AI Caption Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1d2671, #c33764);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.1);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

h1 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #ff4b2b;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#output {
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">
  <h1>AI Caption Generator</h1>

  <input type="text" id="inputText" placeholder="Enter your text..." />

  <button onclick="generate()">Generate Caption</button>

  <p id="output"></p>
</div>

<script>
<script>
function generate() {
  let text = document.getElementById("inputText").value;

  let captions = [
    "✨ " + text + " is pure magic!",
    "🔥 This moment is unforgettable!",
    "💖 Living the dream!",
    "😎 Style speaks louder!",
    "🌟 Shine like a star!",
    "💫 Just vibes & good times!",
    "📸 Capturing memories!",
    "❤️ Feeling amazing today!",
    "⚡ Energy on another level!",
    "🌈 Happiness looks good!"
  ];

  let randomCaptions = [];

  for (let i = 0; i < 3; i++) {
    let random = captions[Math.floor(Math.random() * captions.length)];
    randomCaptions.push(random);
  }

  document.getElementById("output").innerHTML = randomCaptions.join("<br>");
}
</script>
